{% extends "base.html" %}

{% block title %}Вход — Искра{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <svg class="logo-small" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#0077ff"/>
                <path d="M35 30 L65 50 L35 70 Z" fill="white"/>
            </svg>
            <h2>Вход в Искру</h2>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username или Iskra ID</label>
                <input type="text" id="username" name="username" required 
                       placeholder="@username или 123456789"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <div class="password-input">
                    <input type="password" id="password" name="password" required 
                           placeholder="Введите пароль"
                           autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Запомнить меня</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>

            <div class="auth-footer">
                <p>Ещё нет аккаунта? <a href="/register">Создать</a></p>
            </div>
        </form>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/auth/login-json', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/feed';
        } else {
            errorDiv.textContent = data.detail || 'Ошибка входа';
            errorDiv.style.display = 'flex';
        }
    } catch (err) {
        errorDiv.textContent = 'Сервер недоступен';
        errorDiv.style.display = 'flex';
    }
});

function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = input.parentNode.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
