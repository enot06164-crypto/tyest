{% extends "base.html" %}

{% block title %}Вход — Искра{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <svg class="logo-small" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#0077ff"/>
                <path d="M35 30 L65 50 L35 70 Z" fill="white"/>
            </svg>
            <h2>Вход в Искру</h2>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <svg class="icon icon-user-circle" style="width:16px;height:16px;vertical-align:middle;margin-right:6px;"><use xlink:href="#icon-user-circle"></use></svg>
                    Username или Iskra ID
                </label>
                <input type="text" id="username" name="username" required 
                       placeholder="@username или 123456789"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">
                    <svg class="icon icon-lock" style="width:16px;height:16px;vertical-align:middle;margin-right:6px;"><use xlink:href="#icon-lock"></use></svg>
                    Пароль
                </label>
                <div class="password-input">
                    <input type="password" id="password" name="password" required 
                           placeholder="Введите пароль"
                           autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <svg class="icon icon-eye"><use xlink:href="#icon-eye"></use></svg>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Запомнить меня</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                <svg class="icon icon-sign-in" style="width:16px;height:16px;margin-right:6px;"><use xlink:href="#icon-sign-in"></use></svg>
                Войти
            </button>

            <div class="auth-footer">
                <p>Ещё нет аккаунта? <a href="/register">Создать</a></p>
            </div>
        </form>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>
</div>

<!-- Icons Sprite -->
<svg style="display: none;">
    <symbol id="icon-user-circle" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></symbol>
    <symbol id="icon-lock" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></symbol>
    <symbol id="icon-eye-off" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></symbol>
    <symbol id="icon-sign-in" viewBox="0 0 24 24"><path d="M10 17l5-5-5-5v10zM4.01 5.99L4 20h16V4H4v1.99z"/></symbol>
    <symbol id="icon-warning" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></symbol>
</svg>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/auth/login-json', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/feed';
        } else {
            errorDiv.innerHTML = '<svg class="icon icon-warning" style="width:18px;height:18px;margin-right:8px;"><use xlink:href="#icon-warning"></use></svg>' + (data.detail || 'Ошибка входа');
            errorDiv.style.display = 'flex';
        }
    } catch (err) {
        errorDiv.textContent = 'Сервер недоступен';
        errorDiv.style.display = 'flex';
    }
});

function togglePassword(id) {
    const input = document.getElementById(id);
    const button = input.parentNode.querySelector('.toggle-password');
    const iconUse = button.querySelector('svg use');
    if (input.type === 'password') {
        input.type = 'text';
        iconUse.setAttribute('xlink:href', '#icon-eye-off');
    } else {
        input.type = 'password';
        iconUse.setAttribute('xlink:href', '#icon-eye');
    }
}
</script>
{% endblock %}
